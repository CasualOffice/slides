<svg width="32" height="40" viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Casual Slides">
  <title>Casual Slides</title>
  <!-- Page body — same path as sheet/docx-editor sister icons.
       Fill is PowerPoint orange-red (#B7472A) instead of sheet
       green (#217346) or docx blue (#1a73e8). -->
  <path d="M2 0C0.9 0 0 0.9 0 2V38C0 39.1 0.9 40 2 40H30C31.1 40 32 39.1 32 38V10L22 0H2Z" fill="#B7472A"/>
  <!-- Folded corner, darker shade. -->
  <path d="M22 0L32 10H24C22.9 10 22 9.1 22 8V0Z" fill="#8B3520"/>
  <!-- Inside the page, paint a tiny "slide" — a rect with a title bar
       and two content lines. Same vertical rhythm (y ranges 17-31) as
       the sheet grid rows and the docx text lines, so the three sister
       icons feel like a family. -->
  <rect x="6" y="17" width="20" height="14" rx="1" fill="#fff" opacity="0.95"/>
  <!-- Title bar inside the slide. -->
  <rect x="8" y="19" width="10" height="2" rx="0.5" fill="#B7472A"/>
  <!-- Content lines. -->
  <rect x="8"  y="23" width="14" height="1.5" rx="0.5" fill="#B7472A" opacity="0.7"/>
  <rect x="8"  y="26" width="10" height="1.5" rx="0.5" fill="#B7472A" opacity="0.7"/>
  <!-- Small play triangle in the corner — signals "present". -->
  <path d="M20.5 26 L24 27.75 L20.5 29.5 Z" fill="#B7472A"/>
</svg>
