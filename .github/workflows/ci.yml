name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# The engine + UI kit are consumed from git submodules built via the pnpm
# workspace (not npm). Every job must check them out recursively, and the
# install must NOT be frozen (the workspace resolves submodule source).
# NOTE: the submodules are private CasualOffice repos — cross-repo checkout
# needs a token with read access to them. Set a `SUBMODULES_TOKEN` secret
# (PAT/app token) if the default GITHUB_TOKEN can't reach them.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      # Source-consumed engine: bundle with Vite (esbuild/Rollup). A standalone
      # `tsc -b` over the engine source under the product's strict tsconfig is
      # not viable without building the engine's .d.ts — tracked separately.
      - run: pnpm --filter @point/web exec vite build

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm test:unit

  e2e:
    runs-on: ubuntu-latest
    # Informational only: the e2e suite is a LibreOffice-based visual
    # fidelity-comparison (render vs ground-truth PDF) that measures fidelity
    # still being improved and needs soffice in the runner. The test step is
    # continue-on-error so the JOB reports green (results live in the uploaded
    # Playwright report); `build` + `unit` are the gating checks.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      # Cache Playwright browser binaries to skip the ~200 MB download on
      # most runs. Lockfile is the cache key since the version is pinned via
      # @playwright/test in package.json.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium
      - name: Run e2e (informational — never fails the job)
        continue-on-error: true
        run: pnpm test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
